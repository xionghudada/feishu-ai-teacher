name: AI 老师自动批改作业 (开学版)

on:
  workflow_dispatch:

  schedule:
    # =========================
    # 工作日：北京时间 17:30 - 23:30
    # 目标：最迟每 20 分钟一次
    # 使用偏移分钟，尽量避开 GitHub 整点高峰
    # UTC 对应：09:30 - 15:30
    # 实际触发：17:47, 18:07, 18:27 ... 23:07, 23:27
    # =========================
    - cron: '47 9 * * 1-5'
    - cron: '7,27,47 10-14 * * 1-5'
    - cron: '7,27 15 * * 1-5'

    # =========================
    # 周末：北京时间 09:00 - 22:30
    # 目标：最迟每 30 分钟一次
    # UTC 对应：01:00 - 14:30
    # 实际触发：09:07, 09:37, 10:07 ... 21:37, 22:07
    # =========================
    - cron: '7,37 1-13 * * 6,0'
    - cron: '7 14 * * 6,0'

concurrency:
  group: ai-grade-homework
  cancel-in-progress: false

jobs:
  grade_homework:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 打印触发时间
        run: |
          echo "GitHub event: ${{ github.event_name }}"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          TZ=Asia/Shanghai date '+Beijing now: %Y-%m-%d %H:%M:%S CST'

      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: 运行批改脚本
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
          TABLE_ID: ${{ secrets.TABLE_ID }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python main.py
