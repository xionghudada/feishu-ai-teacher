name: AI 老师自动批改作业 (开学版)

on:
  workflow_dispatch: # 允许手动触发
  
  schedule:
    # =======================================================
    # 🗓️ 工作日模式：周一至周五 (Mon-Fri)
    # 目标：北京时间 17:30 - 23:30 (每小时一次)
    # 对应 UTC: 09:30 - 15:30
    # =======================================================
    - cron: '30 9-15 * * 1-5'

    # =======================================================
    # 🗓️ 周末模式：周六、周日 (Sat-Sun)
    # 目标：北京时间 09:00 - 22:00 (每小时一次)
    # 对应 UTC: 01:00 - 14:00
    # =======================================================
    - cron: '0 1-14 * * 6,0'

jobs:
  grade_homework:
    runs-on: ubuntu-latest
    
    steps:
    - name: 拉取代码
      uses: actions/checkout@v3
      
    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: 安装依赖库
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: 运行批改脚本
      env:
        APP_ID: ${{ secrets.APP_ID }}
        APP_SECRET: ${{ secrets.APP_SECRET }}
        APP_TOKEN: ${{ secrets.APP_TOKEN }}
        TABLE_ID: ${{ secrets.TABLE_ID }}
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
      run: python main.py
