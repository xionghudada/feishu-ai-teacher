name: 定时清空表格 (开学调整版)

on:
  # 允许手动点击按钮触发
  workflow_dispatch:
  
  # 定时任务
  schedule:
    # =======================================================
    # 🗓️ 工作日模式：周一至周五 (Mon-Fri)
    # 目标：北京时间 16:00 (下午 4 点)
    # 对应 UTC: 08:00
    # =======================================================
    - cron: '0 8 * * 1-5'

    # =======================================================
    # 🗓️ 周六模式 (Saturday)
    # 目标：北京时间 23:30 (晚上 11 点半)
    # 对应 UTC: 15:30
    # =======================================================
    - cron: '30 15 * * 6'

    # 周末（周日）不设置 cron，则不会运行

jobs:
  clear_data:
    runs-on: ubuntu-latest
    
    steps:
    - name: 拉取代码
      uses: actions/checkout@v3
      
    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: 安装依赖库
      run: pip install lark-oapi
      
    - name: 执行清空脚本
      env:
        APP_ID: ${{ secrets.APP_ID }}
        APP_SECRET: ${{ secrets.APP_SECRET }}
        APP_TOKEN: ${{ secrets.APP_TOKEN }}
        TABLE_ID: ${{ secrets.TABLE_ID }}
      run: python clear_data.py
